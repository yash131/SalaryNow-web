<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SalaryNow | Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Urbanist:wght@300;600&display=swap" rel="stylesheet" />
  <style>
    /* Reset & base */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Urbanist', sans-serif;
      background: linear-gradient(135deg, #121212, #2c3e50);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 12px;
      transition: background-color 0.4s ease;
    }
    a {
      color: #ff6f91; /* pink highlight */
      text-decoration: none;
      font-weight: 600;
    }
    a:hover,
    a:focus {
      text-decoration: underline;
      outline-offset: 2px;
      outline-color: #ff6f91;
    }

    /* Container */
    .dashboard-container {
      width: 100%;
      max-width: 960px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }
    @media (max-width: 720px) {
      .dashboard-container {
        grid-template-columns: 1fr;
      }
    }

    /* Glass effect card base */
    .glass-card {
      background: rgba(30, 30, 30, 0.65);
      border-radius: 16px;
      box-shadow:
        0 8px 32px 0 rgba(0, 0, 0, 0.37),
        inset 0 0 60px 10px rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      color: #e0e0e0;
    }

    /* Glass header */
    header.glass-header {
      grid-column: 1 / -1;
      background: rgba(30, 30, 30, 0.75);
      border-radius: 16px;
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow:
        0 6px 20px rgba(0,0,0,0.6);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.23);
      margin-bottom: 32px;
      font-family: 'Orbitron', monospace;
      font-weight: 600;
      font-size: 1.8rem;
      color: #ff6f91;
    }

    /* Logout button */
    .logout {
      background: transparent;
      border: 2px solid #ff6f91;
      padding: 8px 20px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      transition: background-color 0.3s ease, color 0.3s ease;
      cursor: pointer;
      user-select: none;
    }
    .logout:hover,
    .logout:focus {
      background-color: #ff6f91;
      color: #121212;
      outline: none;
    }

    /* Form styles */
    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    form input[type="number"],
    form input[type="text"] {
      background: rgba(255, 255, 255, 0.12);
      border: none;
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 1.1rem;
      padding: 12px 16px;
      font-weight: 400;
      transition: background-color 0.3s ease;
    }
    form input[type="number"]:focus,
    form input[type="text"]:focus {
      background: rgba(255, 255, 255, 0.25);
      outline: none;
      box-shadow: 0 0 10px 2px #ff6f91;
      color: #fff;
    }
    form input::placeholder {
      color: rgba(224, 224, 224, 0.7);
      font-style: italic;
    }
    form button {
      background: #ff6f91;
      color: #121212;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }
    form button:hover,
    form button:focus {
      background: #ff496d;
      outline: none;
      transform: scale(1.05);
    }

    /* Requests card */
    .requests-card ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 360px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #ff6f91 transparent;
    }
    .requests-card ul::-webkit-scrollbar {
      width: 8px;
    }
    .requests-card ul::-webkit-scrollbar-thumb {
      background-color: #ff6f91;
      border-radius: 8px;
    }

    .requests-card li {
      background: rgba(40, 40, 40, 0.7);
      border-radius: 12px;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background-color 0.3s ease;
      font-size: 1.05rem;
      font-weight: 600;
      gap: 12px;
      color: #f8f8f8;
    }
    .requests-card li:hover {
      background: rgba(255, 111, 145, 0.3);
      color: #fff;
    }

    /* Status badges */
    .status {
      padding: 6px 18px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.6px;
      user-select: none;
      width: max-content;
      min-width: 96px;
      text-align: center;
    }
    .status.pending {
      background: #ffa94d;
      color: #3d2f00;
      box-shadow: 0 0 8px #ffa94daa;
    }
    .status.approved {
      background: #4cd137;
      color: #082900;
      box-shadow: 0 0 8px #4cd137aa;
    }
    .status.rejected {
      background: #ff4d6d;
      color: #420009;
      box-shadow: 0 0 8px #ff4d6daa;
    }

    /* AI assistant container */
    .ai-assistant {
      width: 100%;
      max-width: 960px;
      background: rgba(30, 30, 30, 0.75);
      border-radius: 16px;
      padding: 28px 32px;
      box-shadow:
        0 8px 32px 0 rgba(0, 0, 0, 0.6),
        inset 0 0 60px 10px rgba(255,255,255,0.12);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #eee;
      font-family: 'Orbitron', monospace;
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 48px;
    }
    .ai-assistant h3 {
      margin: 0;
      font-weight: 700;
      font-size: 1.5rem;
      color: #ff6f91;
      user-select: none;
    }

    /* AI form */
    #ai-form {
      display: flex;
      gap: 12px;
      flex-wrap: nowrap;
    }
    #ai-input {
      flex-grow: 1;
      font-size: 1.1rem;
      padding: 12px 18px;
      border-radius: 14px;
      border: none;
      background: rgba(255, 255, 255, 0.12);
      color: #eee;
      transition: background-color 0.3s ease;
    }
    #ai-input::placeholder {
      color: rgba(224, 224, 224, 0.7);
      font-style: italic;
    }
    #ai-input:focus {
      background: rgba(255, 255, 255, 0.25);
      outline: none;
      box-shadow: 0 0 10px 2px #ff6f91;
    }

    #ai-form button {
      background: #ff6f91;
      border: none;
      padding: 12px 24px;
      font-weight: 700;
      color: #121212;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background-color 0.3s ease, transform 0.2s ease;
      user-select: none;
    }
    #ai-form button:hover,
    #ai-form button:focus {
      background: #ff496d;
      outline: none;
      transform: scale(1.05);
    }

    /* AI response box */
    #ai-response {
      min-height: 100px;
      background: rgba(50, 50, 50, 0.6);
      border-radius: 12px;
      padding: 18px 24px;
      font-size: 1.05rem;
      line-height: 1.4;
      overflow-y: auto;
      max-height: 250px;
      color: #ffdce6;
      user-select: text;
      white-space: pre-wrap;
      font-family: 'Urbanist', sans-serif;
    }

    /* Loading spinner for AI */
    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top: 3px solid #ff6f91;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      animation: spin 1s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-left: 8px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }

    /* Focus outlines for accessibility */
    button:focus,
    input:focus,
    a:focus {
      outline: 3px solid #ff6f91;
      outline-offset: 3px;
    }
  </style>
</head>
<body>

  <header class="glass-header" role="banner">
    <h1>Welcome, {{ username }}</h1>
    <a href="/logout" class="logout" role="button" tabindex="0">Logout</a>
  </header>

  <main class="dashboard-container" role="main" aria-label="SalaryNow dashboard">

    <section class="glass-card form-card" aria-labelledby="company-details-heading" id="company-details-section">
      <h2 id="company-details-heading">Company Details</h2>
      <form id="company-details-form" novalidate>
        <input
          type="text"
          name="company_name"
          placeholder="Company Name"
          required
          aria-required="true"
          aria-label="Company name"
        />
        <input
          type="text"
          name="monthly_earnings"
          placeholder="Monthly Earnings (₹)"
          inputmode="numeric"
          required
          aria-required="true"
          aria-label="Monthly earnings in rupees"
        />
        <input
          type="text"
          name="bank_details"
          placeholder="Bank Account Details"
          required
          aria-required="true"
          aria-label="Bank account details"
        />
        <input
          type="text"
          name="pan_card"
          placeholder="PAN Card Number"
          required
          aria-required="true"
          aria-label="PAN card number"
        />
        <button type="submit" aria-label="Submit company details">Submit</button>
      </form>
    </section>

    <section class="glass-card form-card" aria-labelledby="request-salary-heading" id="request-salary-section" style="display: none;">
      <h2 id="request-salary-heading">Request Salary</h2>
      <p id="remaining-salary" style="font-weight: bold;">Remaining Salary: ₹<span id="remaining-amount">0</span></p>
      <form method="POST" action="/request" novalidate>
        <input
          type="number"
          name="amount"
          placeholder="Amount (₹)"
          inputmode="numeric"
          min="1"
          required
          aria-required="true"
          aria-label="Salary amount in rupees"
        />
        <input
          type="text"
          name="reason"
          placeholder="Reason"
          required
          aria-required="true"
          aria-label="Reason for salary request"
          maxlength="100"
        />
        <button type="submit" aria-label="Submit salary request">Submit Request</button>
      </form>
    </section>

    <section class="glass-card requests-card" aria-labelledby="your-requests-heading">
      <h2 id="your-requests-heading">Your Requests</h2>
      <ul role="list" aria-live="polite" aria-relevant="additions removals">
        {% for r in requests %}
          <li>
            <div>
              ₹<strong>{{ r.amount }}</strong> — "<span aria-label="Reason">{{ r.reason }}</span>"
              <span class="status {{ r.status | lower }}" aria-label="Request status">{{ r.status }}</span>
            </div>
          </li>
        {% endfor %}
      </ul>
    </section>

  </main>

  <section class="ai-assistant" aria-label="SalaryNow AI assistant">
    <h3>🤖 Ask SalaryNow AI</h3>
    <form id="ai-form" aria-describedby="ai-description">
      <input
        type="text"
        id="ai-input"
        placeholder="Ask something..."
        autocomplete="off"
        required
        aria-required="true"
        aria-label="Ask SalaryNow AI a question"
        maxlength="200"
      />
      <button type="submit" aria-label="Send AI question">Send</button>
    </form>
    <small id="ai-description" style="color:#bbb; font-style: italic;">Get AI-powered help about salary requests</small>
    <div id="ai-response" tabindex="0" aria-live="polite" aria-atomic="true"></div>
  </section>

  <script>
    const companyDetailsForm = document.getElementById('company-details-form');
    const requestSalarySection = document.getElementById('request-salary-section');
    const remainingAmountDisplay = document.getElementById('remaining-amount');

    // Assuming the user has a total salary amount (this can be fetched from the server)
    let totalSalary = 0;

    companyDetailsForm.addEventListener('submit', (e) => {
      e.preventDefault();

      // Get the monthly earnings from the form
      const monthlyEarnings = parseFloat(companyDetailsForm.elements['monthly_earnings'].value);
      totalSalary = monthlyEarnings; // Set total salary to monthly earnings

      // Update the remaining salary display
      remainingAmountDisplay.textContent = totalSalary.toFixed(2);

      // Show the request salary section
      requestSalarySection.style.display = 'block';
    });

    const aiForm = document.getElementById('ai-form');
    const aiInput = document.getElementById('ai-input');
    const aiResponse = document.getElementById('ai-response');

    function createSpinner() {
      const spinner = document.createElement('span');
      spinner.classList.add('spinner');
      spinner.setAttribute('aria-hidden', 'true');
      spinner.setAttribute('role', 'presentation');
      return spinner;
    }

    aiForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const inputVal = aiInput.value.trim();
      if (!inputVal) return;

      aiResponse.textContent = 'Thinking... ';
      const spinner = createSpinner();
      aiResponse.appendChild(spinner);

      try {
        const response = await fetch('/ai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: inputVal })
        });

        if (!response.ok) {
          throw new Error(`Error: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();

        aiResponse.innerHTML = `<strong>AI:</strong> ${data.reply}`;
      } catch (error) {
        aiResponse.innerHTML = `<strong>Error:</strong> ${error.message}`;
      } finally {
        aiInput.value = '';
        aiInput.focus();
      }
    });
  </script>
</body>
</html>
