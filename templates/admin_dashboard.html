<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard | SalaryNow</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Urbanist:wght@300;600&display=swap" rel="stylesheet" />
  <style>
    /* Reset and base */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Urbanist', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px 40px;
      color: white;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      user-select: none;
    }
    h1 {
      font-weight: 700;
      font-size: 2.75rem;
      margin-bottom: 30px;
      text-align: center;
      color: #00fff7;
      text-shadow: 0 0 6px #00fff7aa;
      user-select: text;
    }
    /* Container for table and controls */
    .dashboard-wrapper {
      width: 100%;
      max-width: 1100px;
      background: rgba(15, 30, 39, 0.85);
      border-radius: 18px;
      box-shadow:
        0 15px 24px rgba(0, 255, 255, 0.25),
        inset 0 0 40px 6px rgba(0,255,255,0.15);
      padding: 24px 28px 32px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      gap: 16px;
      user-select: text;
    }
    /* Search input */
    .search-container {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }
    .search-input {
      width: 280px;
      padding: 10px 16px;
      border-radius: 14px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      color: #002d33;
      background: #00fff7;
      box-shadow: 0 0 10px #00fff7aa;
      transition: box-shadow 0.3s ease;
    }
    .search-input::placeholder {
      color: #004d4d;
      font-style: italic;
    }
    .search-input:focus {
      outline: none;
      box-shadow: 0 0 20px #00fff7ee;
    }
    /* Table styles */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: transparent;
      overflow-x: auto;
      border-radius: 14px;
      user-select: text;
      table-layout: fixed;
    }
    thead tr {
      background: rgba(0, 255, 255, 0.15);
      position: sticky;
      top: 0;
      z-index: 2;
      box-shadow: 0 6px 12px -3px #00fff730;
      font-weight: 700;
      color: #00fff7;
      font-size: 1rem;
      user-select: text;
    }
    thead th {
      padding: 16px;
      cursor: pointer;
      position: relative;
      text-align: center;
      user-select: text;
      -webkit-user-select: none;
    }
    thead th:hover,
    thead th:focus {
      color: #ffff7f;
      outline: none;
      text-shadow: 0 0 10px #ffff7fbb;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }
    /* Sort arrows */
    .sort-arrow {
      font-size: 0.86rem;
      margin-left: 6px;
      user-select: none;
      color: #00b3b3dd;
      vertical-align: middle;
      transition: color 0.3s ease;
    }
    th.sorted-asc .sort-arrow {
      color: #00fff7;
      transform: rotate(180deg);
    }
    th.sorted-desc .sort-arrow {
      color: #00fff7;
      transform: rotate(0deg);
    }
    tbody tr {
      background: rgba(255,255,255,0.05);
      color: #e0f7f7;
      font-size: 0.95rem;
      transition: background-color 0.25s ease, transform 0.2s ease;
      user-select: text;
    }
    tbody tr:hover,
    tbody tr:focus-within {
      background: #00fff7;
      color: #002d33;
      transform: scale(1.02);
      box-shadow: 0 0 16px #00fff7bb;
      outline: none;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    tbody tr:focus-within {
      outline-offset: -4px;
      outline: 3px solid #00fff7cc;
    }
    tbody td {
      padding: 14px 12px;
      text-align: center;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: normal;
      font-weight: 600;
    }
    /* Status badges */
    .status-badge {
      display: inline-block;
      padding: 6px 16px;
      font-size: 0.85rem;
      border-radius: 20px;
      font-weight: 700;
      user-select: none;
      min-width: 90px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      box-shadow: 0 0 7px #00000088;
      transition: all 0.3s ease;
    }
    .status-pending {
      background: #ffc107aa;
      color: #4a3f00;
      text-shadow: 0 0 4px #4a3f0040;
    }
    .status-approved {
      background: #4caf50aa;
      color: #0e270b;
      text-shadow: 0 0 4px #0e270b40;
    }
    .status-rejected {
      background: #f44336aa;
      color: #510f0a;
      text-shadow: 0 0 5px #510f0a40;
    }
    /* Action buttons */
    .btn {
      border: none;
      padding: 8px 14px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 0 12px #00000088;
      transition: all 0.3s ease;
      user-select: none;
      width: 95px;
      text-align: center;
      display: inline-block;
      color: black;
      font-family: 'Urbanist', sans-serif;
      line-height: 1.15;
    }
    .btn.approve {
      background: #00ffcc;
      box-shadow: 0 0 18px #00ffcc88;
    }
    .btn.reject {
      background: #ff3c3c;
      box-shadow: 0 0 18px #ff3c3c88;
    }
    .btn:hover,
    .btn:focus {
      filter: brightness(110%);
      outline: none;
      box-shadow:
        0 0 20px #ffffffbb,
        0 0 24px currentColor;
      transform: translateY(-2px);
    }
    /* Table scroll on small devices */
    @media (max-width: 850px) {
      .dashboard-wrapper {
        padding: 16px 12px 24px;
      }
      table {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      thead, tbody, tr, th, td {
        display: table;
        white-space: nowrap;
      }
      tbody tr:hover, tbody tr:focus-within {
        transform: none;
        box-shadow: none;
        background: rgba(0,255,255,0.15);
        color: #002d33;
      }
    }
    /* Pagination */
    .pagination {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      gap: 12px;
      user-select: none;
    }
    .pagination button {
      background: rgba(0, 255, 255, 0.15);
      border: none;
      border-radius: 14px;
      padding: 8px 14px;
      font-weight: 700;
      font-size: 1rem;
      color: #00fff7;
      cursor: pointer;
      box-shadow: 0 0 14px #00fff788;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .pagination button:hover,
    .pagination button:focus {
      background: #00fff7aa;
      color: #003333;
      outline: none;
    }
    .pagination button[disabled] {
      cursor: not-allowed;
      color: #009999aa;
      background: rgba(0, 255, 255, 0.06);
      box-shadow: none;
    }
    /* Logout button */
    .logout-container {
      margin-top: 40px;
      width: 100%;
      text-align: center;
      user-select: none;
    }
    .logout-btn {
      background: transparent;
      color: #00fff7;
      border: 2.5px solid #00fff7;
      padding: 12px 32px;
      border-radius: 28px;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: 1.4px;
      cursor: pointer;
      box-shadow: 0 0 14px #00fff7aa;
      transition: background-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
      user-select: none;
    }
    .logout-btn:hover,
    .logout-btn:focus {
      background-color: #00fff7;
      color: #002d33;
      box-shadow: 0 0 30px #00fff7cc;
      outline: none;
      transform: translateY(-1px);
    }
    /* Confirmation modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal {
      background: rgba(15,30,39,0.95);
      border-radius: 22px;
      box-shadow:
        0 0 40px #00fff7cc,
        inset 0 0 16px #00fff7cc;
      padding: 32px 36px 28px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      color: #00fff7;
      user-select: none;
    }
    .modal h2 {
      font-weight: 900;
      font-size: 1.8rem;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
      user-select: text;
    }
    .modal p {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 24px;
      color: #a3fffaff;
      user-select: text;
    }
    .modal-buttons {
      display: flex;
      justify-content: center;
      gap: 24px;
    }
    .modal-button {
      flex: 1;
      padding: 12px 0;
      border-radius: 24px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 0 15px #00fff7bb;
      transition: background-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
      user-select: none;
      border: none;
    }
    .modal-button.confirm {
      background: #00ffcc;
      color: #002d33;
    }
    .modal-button.confirm:hover,
    .modal-button.confirm:focus {
      background: #00e6b8;
      box-shadow: 0 0 30px #00e6b888;
      outline: none;
    }
    .modal-button.cancel {
      background: #ff3c3c;
      color: white;
    }
    .modal-button.cancel:hover,
    .modal-button.cancel:focus {
      background: #e64040;
      box-shadow: 0 0 30px #e6404088;
      outline: none;
    }
    /* Responsive tweaks */
    @media (max-width: 480px) {
      .search-input {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <h1 id="main-title">👨‍💼 Admin Dashboard</h1>

  <div class="dashboard-wrapper" role="region" aria-labelledby="main-title">

    <div class="search-container">
      <label for="search-input" class="visually-hidden">Search requests</label>
      <input
        type="search"
        id="search-input"
        class="search-input"
        placeholder="Search user, reason, or status..."
        aria-describedby="search-desc"
        autocomplete="off"
      />
    </div>

    <table role="table" aria-label="Salary request approvals">
      <thead>
        <tr role="row">
          <th role="columnheader" tabindex="0" data-sort-key="id" aria-sort="none" aria-label="ID, sortable">ID <span class="sort-arrow">&#9650;</span></th>
          <th role="columnheader" tabindex="0" data-sort-key="username" aria-sort="none" aria-label="User , sortable">User  <span class="sort-arrow">&#9650;</span></th>
          <th role="columnheader" tabindex="0" data-sort-key="amount" aria-sort="none" aria-label="Amount in rupees, sortable">Amount (₹) <span class="sort-arrow">&#9650;</span></th>
          <th role="columnheader" tabindex="0" data-sort-key="reason" aria-sort="none" aria-label="Reason, sortable">Reason <span class="sort-arrow">&#9650;</span></th>
          <th role="columnheader" tabindex="0" data-sort-key="status" aria-sort="none" aria-label="Status, sortable">Status <span class="sort-arrow">&#9650;</span></th>
          <th role="columnheader" aria-label="Actions">Actions</th>
        </tr>
      </thead>
      <tbody id="requests-tbody" role="rowgroup">
        {% for r in requests %}
        <tr role="row" tabindex="0" data-id="{{ r.id }}" data-username="{{ r.username }}" data-amount="{{ r.amount }}" data-reason="{{ r.reason }}" data-status="{{ r.status }}">
          <td role="cell" data-label="ID">{{ r.id }}</td>
          <td role="cell" data-label="User ">{{ r.username }}</td>
          <td role="cell" data-label="Amount (₹)">{{ r.amount }}</td>
          <td role="cell" data-label="Reason">{{ r.reason }}</td>
          <td role="cell" data-label="Status">
            <span class="status-badge status-{{ r.status | lower }}">{{ r.status }}</span>
          </td>
          <td role="cell" data-label="Actions">
            {% if r.status == 'Pending' %}
            <button
              class="btn approve"
              aria-label="Approve request ID {{ r.id }} from user {{ r.username }}"
              data-action="approve"
              data-request-id="{{ r.id }}"
            >✅ Approve</button>
            <button
              class="btn reject"
              aria-label="Reject request ID {{ r.id }} from user {{ r.username }}"
              data-action="reject"
              data-request-id="{{ r.id }}"
            >❌ Reject</button>
            {% else %}
            <em>{{ r.status }}</em>
            {% endif %}
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <nav class="pagination" aria-label="Pagination controls" role="navigation">
      <button id="prev-page" aria-label="Previous page" disabled>&lt; Prev</button>
      <button id="next-page" aria-label="Next page" disabled>Next &gt;</button>
    </nav>

  </div>

  <div class="logout-container">
    <a href="/logout" class="logout-btn" role="button" tabindex="0">🚪 Logout</a>
  </div>

  <!-- Confirmation modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-desc" tabindex="-1">
    <div class="modal" role="document">
      <h2 id="modal-title">Confirm Action</h2>
      <p id="modal-desc"></p>
      <div class="modal-buttons">
        <button class="modal-button confirm" id="confirm-btn" aria-label="Confirm action">Confirm</button>
        <button class="modal-button cancel" id="cancel-btn" aria-label="Cancel action">Cancel</button>
      </div>
    </div>
  </div>

<script>
  (() => {
    const tbody = document.getElementById('requests-tbody');
    const searchInput = document.getElementById('search-input');
    const prevPageBtn = document.getElementById('prev-page');
    const nextPageBtn = document.getElementById('next-page');
    const modalOverlay
